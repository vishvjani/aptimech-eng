<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Aptismech Corporation LLP</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Converts the 404 path into a query string and redirects to index.html
      // so React Router can handle it correctly
      var pathSegmentsToKeep = 1; // number of path segments in the repo name (1 for /aptismech-website/)

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
